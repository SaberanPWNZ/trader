name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    if: github.event_name == 'push'
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/trader
            git pull origin main
            docker-compose up -d --build
            echo "Deploy completed at $(date)"

      - name: Notify Telegram (deploy success)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"parse_mode\":\"HTML\",\"text\":\"🚀 <b>Deployed to Production</b>\n\n📦 <code>${GITHUB_REPOSITORY}</code>\n🔗 Commit: <code>${GITHUB_SHA::7}</code>\n👤 ${GITHUB_ACTOR}\"}"

      - name: Notify Telegram (deploy failure)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"parse_mode\":\"HTML\",\"text\":\"💥 <b>Deploy FAILED</b>\n\n📦 <code>${GITHUB_REPOSITORY}</code>\n🔗 Commit: <code>${GITHUB_SHA::7}</code>\n👤 ${GITHUB_ACTOR}\n\n<a href=\\\"https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\\\">View logs</a>\"}"
